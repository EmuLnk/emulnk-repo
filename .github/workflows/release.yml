name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TS themes
        run: pnpm build

      - name: Type-check
        run: pnpm typecheck

      - name: Validate
        run: pnpm validate

      - name: Package release zip
        run: pnpm package

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: |
            Auto-generated release from main branch.
            Contains all themes (vanilla + framework-built) ready for EmuLnk consumption.
          files: release/emulnk-repo.zip
          make_latest: true
