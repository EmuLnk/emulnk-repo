<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:visible;background:transparent;font-family:-apple-system,'Segoe UI',Roboto,sans-serif;-webkit-user-select:none;user-select:none}
#w{display:none;width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;gap:3px}
#w.on{display:flex}
.t{font-size:11px;font-weight:700;font-family:'SF Mono',ui-monospace,monospace;text-transform:uppercase;letter-spacing:0.4px;padding:2px 6px;border-radius:3px;color:#fff;white-space:nowrap;line-height:1.2;min-width:3ch;text-align:center}
</style>
</head>
<body>
<div id="w"></div>
<script>
'use strict';
var TN={0:'NRM',1:'FGT',2:'FLY',3:'PSN',4:'GND',5:'RCK',7:'BUG',8:'GHO',9:'STL',20:'FIR',21:'WTR',22:'GRS',23:'ELC',24:'PSY',25:'ICE',26:'DRG',27:'DRK'};
var TC={0:'#A8A878',1:'#C03028',2:'#A890F0',3:'#A040A0',4:'#E0C068',5:'#B8A038',7:'#A8B820',8:'#705898',9:'#B8B8D0',20:'#F08030',21:'#6890F0',22:'#78C850',23:'#F8D030',24:'#F85888',25:'#98D8D8',26:'#7038F8',27:'#705848'};
window.updateData=function(d){
try{
var raw=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(d),function(c){return c.charCodeAt(0)})));
var v=raw.values||{};
var w=document.getElementById('w');
if(!(v.battle_mode||0)){w.className='';return;}
var rp=v.player_battle_mon;
if(!rp){w.className='';return;}
var b=Uint8Array.from(atob(rp),function(c){return c.charCodeAt(0)});
if(b.length<32){w.className='';return;}
var t1=b[0x1E],t2=b[0x1F];
w.textContent='';
var n1=TN[t1];
if(n1){var s=document.createElement('span');s.className='t';s.style.background=TC[t1]||'#888';s.textContent=n1;w.appendChild(s);}
if(t2!==t1){var n2=TN[t2];if(n2){var s2=document.createElement('span');s2.className='t';s2.style.background=TC[t2]||'#888';s2.textContent=n2;w.appendChild(s2);}}
w.className='on';
}catch(e){}
};
</script>
</body>
</html>
