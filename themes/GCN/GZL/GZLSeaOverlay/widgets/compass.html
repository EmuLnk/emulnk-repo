<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;-webkit-user-select:none;user-select:none}
canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>
<canvas id="compass"></canvas>
<script>
'use strict';
var playerDeg=0,windDeg=0;
var canvas,ctx;

function decodeB64(e){try{var b=atob(e),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return new TextDecoder('utf-8').decode(a)}catch(x){return atob(e)}}

window.updateData=function(d,enc){
  try{
    var p=enc?JSON.parse(decodeB64(d)):typeof d==='string'?JSON.parse(d):d;
    var v=p.values||{};
    playerDeg=v.rotation_y||0;
    windDeg=v.wind_direction||0;
  }catch(e){}
};

function drawArrow(c,cx,cy,rad,length,width,color){
  c.save();c.translate(cx,cy);c.rotate(rad);
  c.beginPath();c.moveTo(length,0);c.lineTo(-length*0.3,-width);c.lineTo(-length*0.1,0);c.lineTo(-length*0.3,width);c.closePath();
  c.fillStyle=color;c.fill();c.strokeStyle='rgba(0,0,0,0.4)';c.lineWidth=1;c.stroke();c.restore();
}

function render(){
  if(!canvas)return;
  var dpr=window.devicePixelRatio||1;
  var dw=canvas.clientWidth,dh=canvas.clientHeight;
  if(canvas.width!==dw*dpr||canvas.height!==dh*dpr){canvas.width=dw*dpr;canvas.height=dh*dpr}
  var w=canvas.width,h=canvas.height;
  var cx=w/2,cy=h/2,r=Math.min(w,h)*0.42;
  ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,w,h);

  // Background circle
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.stroke();

  // Cardinal labels
  ctx.globalAlpha=0.7;var fs=Math.round(r*0.3);ctx.font=fs+'px sans-serif';ctx.fillStyle='#FFF';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('N',cx,cy-r*0.72);ctx.fillText('S',cx,cy+r*0.76);
  ctx.font=Math.round(r*0.26)+'px sans-serif';ctx.fillText('W',cx-r*0.72,cy);ctx.fillText('E',cx+r*0.72,cy);

  // Wind arrow (cyan)
  ctx.globalAlpha=0.9;var windRad=(windDeg-90)*Math.PI/180;
  drawArrow(ctx,cx,cy,windRad,r*0.6,r*0.18,'#00E5FF');

  // Player direction (gold, small)
  var pRad=(playerDeg-90)*Math.PI/180;
  drawArrow(ctx,cx,cy,pRad,r*0.45,r*0.12,'#FFD700');

  // Center dot
  ctx.globalAlpha=1;ctx.beginPath();ctx.arc(cx,cy,r*0.08,0,Math.PI*2);ctx.fillStyle='#FFF';ctx.fill();

  // Bearing text
  var dirs=['N','NE','E','SE','S','SW','W','NW'];
  var dirIdx=Math.round(playerDeg/45)%8;
  ctx.font=Math.round(r*0.22)+'px sans-serif';ctx.fillStyle='#d4e8ff';ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillText(dirs[dirIdx]+' '+Math.round(playerDeg)+'\u00B0',cx,cy+r+4);

  requestAnimationFrame(render);
}

function init(){canvas=document.getElementById('compass');ctx=canvas.getContext('2d');requestAnimationFrame(render)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
</html>
